<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team CodeKit</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a class="header__logo">
          <h1>
            <img class="logo-image" src="images/logo.png" alt="code kit logo" />
          </h1>
        </a>
        <!-- <ul class="header__menu">
          <li class="menu__item">
            <a class="pretendard">about</a>
          </li>
          <li class="menu__item">
            <a class="pretendard">contact us</a>
          </li>
        </ul> -->
      </header>

      <main class="main main--about">
        <article class="main__about">
          <div class="inner banner">
            <div class="banner__item banner__item--left">
              <span class="letter"
                ><strong class="emphasis">홈 페이지</strong>부터</span
              >
              <span class="letter"
                ><strong class="emphasis">웹 크롤러</strong>까지</span
              >
            </div>
            <div class="banner__item banner__item--right">
              <span class="letter">아이디어</span>
              <span class="letter">이제 기다리지 마세요!</span>
            </div>
          </div>
          <div class="inner summary">
            <p class="summary__text-box">
              <span class="emphasis letter">최적의 기술로</span>
              <span class="letter">당신의 아이디어를</span>
              <span class="letter">구현합니다</span>
            </p>
            <ul class="skills">
              <li>
                <img src="icons/react-js.png" alt="react icon" />
              </li>
              <li>
                <img src="icons/vue-js.png" alt="vue icon" />
              </li>
              <li>
                <img src="icons/nest-js.png" alt="nest icon" />
              </li>
              <li>
                <img src="icons/webpack.png" alt="webpack icon" />
              </li>
              <li>
                <img src="icons/vite.png" alt="vite icon" />
              </li>
              <li>
                <img
                  src="icons/analytics-amazon-athena.png"
                  alt="analytics-amazon-athena icon"
                />
              </li>
              <li>
                <img src="icons/django.png" alt="django icon" />
              </li>
              <li>
                <img src="icons/flask.png" alt="flask icon" />
              </li>
              <li>
                <img src="icons/aws-cloudwatch.png" alt="aws-cloudwatch icon" />
              </li>
              <li>
                <img src="icons/fast-api.png" alt="fast-api icon" />
              </li>
              <li>
                <img src="icons/aws-dynamodb.png" alt="aws-dynamodb icon" />
              </li>
              <li>
                <img src="icons/jotai.png" alt="jotai icon" />
              </li>
              <li>
                <img src="icons/recoil.png" alt="recoil icon" />
              </li>
              <li>
                <img src="icons/elastic-search.png" alt="elastic-search icon" />
              </li>
              <li>
                <img src="icons/redux.png" alt="redux icon" />
              </li>
              <li>
                <img src="icons/aws-ec2.png" alt="aws-ec2 icon" />
              </li>
              <li>
                <img src="icons/aws-lambda.png" alt="aws-lambda icon" />
              </li>
              <li>
                <img
                  src="icons/aws-sqs-simple-queue-service.png"
                  alt="aws-sqs-simple-queue-service icon"
                />
              </li>
              <li>
                <img src="icons/ant-design.png" alt="ant-design icon" />
              </li>
              <li>
                <img src="icons/element.png" alt="element icon" />
              </li>
              <li>
                <img src="icons/material-ui.png" alt="material-ui icon" />
              </li>
              <li>
                <img
                  src="icons/styled-components.png"
                  alt="styled-components icon"
                />
              </li>
              <li>
                <img src="icons/tailwind-css.png" alt="tailwind-css icon" />
              </li>
              <li>
                <img
                  src="icons/database-amazon-rds.png"
                  alt="database-amazon-rds icon"
                />
              </li>
            </ul>
          </div>
          <div class="inner summary portfolio">
            <ul class="portfolio-list">
              <li class="portfolio-list__item">
                <img src="images/nexon.png" alt="nexon icon" />
              </li>
              <li class="portfolio-list__item">
                <img src="images/naver_ogq.png" alt="naver_ogq icon" />
              </li>
              <li class="portfolio-list__item">
                <img src="images/labelr.png" alt="labelr icon" />
              </li>
              <li class="portfolio-list__item strange-ratio">
                <img src="images/summer_cat.png" alt="summer_cat icon" />
              </li>
              <li class="portfolio-list__item">
                <img src="images/beamin_robot.png" alt="beamin_robot icon" />
              </li>
              <li class="portfolio-list__item">
                <img src="images/kpop_etf.png" alt="kpop_etf icon" />
              </li>
            </ul>
            <p class="summary__text-box">
              <span class="emphasis letter">다양한 경험을</span>
              <span class="letter">바탕으로 아이디어를</span>
              <span class="letter">완성합니다.</span>
            </p>
          </div>
          <div class="lead-contact">
            <div class="lead-contact__text-box">
              <p>지금 바로 시작해보세요!</p>
              <button>
                <span>시작하기</span>
              </button>
            </div>
            <img src="icons/thorus_knot.png" alt="thorus_knot icon" />
            <img
              src="icons/continuous sphere.png"
              alt="continuous sphere icon"
            />
            <img src="icons/helix.png" alt="helix icon" />
            <img src="icons/sphere.png" alt="sphere icon" />
          </div>
        </article>
        <article class="main__contact"></article>
      </main>

      <footer class="footer">
        <img class="logo-image" src="images/logo.png" alt="code kit logo" />
        <span class="pretendard">&copy; All rights reserved.</span>
      </footer>
    </div>
  </body>
</html>
